      4. **Checkout return handler** (Change 3): confirm `handleCheckoutReturn()` or equivalent reads `URLSearchParams` for `?upgrade=success` or `?upgrade=cancel` and shows the right toast. Called at app startup (in `initAuth` or equivalent). Confirmed by `grep "upgrade=" index.html`.

