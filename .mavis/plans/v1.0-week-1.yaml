      ## File 1: `supabase/functions/create-checkout/index.ts`

      Creates a Stripe Checkout Session and returns the URL the user should be redirected to.

      ```typescript
      import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
      import Stripe from 'https://esm.sh/stripe@13?target=deno'

      const corsHeaders = {
        'Access-Control-Allow-Origin': '*',
        'Access-Control-Allow-Headers': 'authorization, x-client-info, apikey, content-type',
        'Access-Control-Allow-Methods': 'POST, OPTIONS',
      }

      // Stripe price IDs — in test mode, these are created via
      // `stripe prices create --product=prod_xxx` and stored as secrets.
      // The function reads them from env so the same code works for
      // both monthly and yearly modes.
      const PRICE_IDS = {
        monthly: Deno.env.get('STRIPE_PRICE_MONTHLY')!,
        yearly: Deno.env.get('STRIPE_PRICE_YEARLY')!,
      }

      const STRIPE_SECRET_KEY = Deno.env.get('STRIPE_SECRET_KEY')!
      const SUPABASE_URL = Deno.env.get('SUPABASE_URL')!
      const SUPABASE_SERVICE_ROLE_KEY = Deno.env.get('SUPABASE_SERVICE_ROLE_KEY')!
      const SITE_URL = Deno.env.get('SITE_URL') ?? 'https://subkit-ten.vercel.app'

      Deno.serve(async (req) => {
        if (req.method === 'OPTIONS') {
          return new Response('ok', { headers: corsHeaders })
        }

        // Auth: require the caller's JWT so we know which user is upgrading.
        const authHeader = req.headers.get('Authorization')
        if (!authHeader) {
          return new Response('Unauthorized', { status: 401, headers: corsHeaders })
        }

        const userClient = createClient(SUPABASE_URL, Deno.env.get('SUPABASE_ANON_KEY')!, {
          global: { headers: { Authorization: authHeader } },
        })
        const { data: { user }, error: userErr } = await userClient.auth.getUser()
        if (userErr || !user) {
          return new Response('Unauthorized', { status: 401, headers: corsHeaders })
        }

        let body: { plan?: 'monthly' | 'yearly' }
        try {
          body = await req.json()
        } catch {
          return new Response('Invalid JSON', { status: 400, headers: corsHeaders })
        }
        const plan = body.plan ?? 'monthly'
        const priceId = PRICE_IDS[plan]
        if (!priceId) {
          return new Response(`No Stripe price configured for plan="${plan}"`, {
            status: 500,
            headers: corsHeaders,
          })
        }

        const stripe = new Stripe(STRIPE_SECRET_KEY, { apiVersion: '2024-04-10' })

        // Service-role client for users-table read/write.
        const adminClient = createClient(SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY)

        // Look up the user's email + existing stripe customer id.
        const { data: userRow } = await adminClient
          .from('users')
          .select('email, stripe_customer_id')
          .eq('id', user.id)
          .single()

        let customerId = userRow?.stripe_customer_id
        if (!customerId) {
          const customer = await stripe.customers.create({
            email: userRow?.email ?? user.email!,
            metadata: { supabase_user_id: user.id },
          })
          customerId = customer.id
          await adminClient
            .from('users')
            .update({ stripe_customer_id: customerId })
            .eq('id', user.id)
        }

        const session = await stripe.checkout.sessions.create({
          customer: customerId,
          mode: 'subscription',
          line_items: [{ price: priceId, quantity: 1 }],
          success_url: `${SITE_URL}/app?upgrade=success`,
          cancel_url: `${SITE_URL}/app?upgrade=cancel`,
          client_reference_id: user.id,
          metadata: { supabase_user_id: user.id, plan },
          subscription_data: {
            metadata: { supabase_user_id: user.id, plan },
          },
        })

        return new Response(JSON.stringify({ url: session.url }), {
          headers: { ...corsHeaders, 'Content-Type': 'application/json' },
        })
      })
      ```

      ## File 2: `supabase/functions/stripe-webhook/index.ts`

      Receives Stripe webhooks and updates `users.plan` accordingly.

      ```typescript
      import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
      import Stripe from 'https://esm.sh/stripe@13?target=deno'

      const STRIPE_SECRET_KEY = Deno.env.get('STRIPE_SECRET_KEY')!
      const STRIPE_WEBHOOK_SECRET = Deno.env.get('STRIPE_WEBHOOK_SECRET')!
      const SUPABASE_URL = Deno.env.get('SUPABASE_URL')!
      const SUPABASE_SERVICE_ROLE_KEY = Deno.env.get('SUPABASE_SERVICE_ROLE_KEY')!

      Deno.serve(async (req) => {
        // Stripe sends the raw body; we need to verify the signature.
        const signature = req.headers.get('stripe-signature')
        if (!signature) {
          return new Response('Missing stripe-signature header', { status: 400 })
        }

        const body = await req.text()
        const stripe = new Stripe(STRIPE_SECRET_KEY, { apiVersion: '2024-04-10' })

        let event: Stripe.Event
        try {
          event = await stripe.webhooks.constructEventAsync(
            body, signature, STRIPE_WEBHOOK_SECRET
          )
        } catch (err) {
          console.error('Webhook signature verification failed:', err)
          return new Response(`Webhook Error: ${(err as Error).message}`, { status: 400 })
        }

        const adminClient = createClient(SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY)

        // Helper: resolve a user id from a Stripe subscription's metadata.
        async function getUserIdFromSub(sub: Stripe.Subscription): Promise<string | null> {
          const meta = (sub.metadata?.supabase_user_id ?? null) as string | null
          if (meta) return meta
          // Fallback: look up by stripe_customer_id.
          if (typeof sub.customer === 'string') {
            const { data } = await adminClient
              .from('users')
              .select('id')
              .eq('stripe_customer_id', sub.customer)
              .single()
            return data?.id ?? null
          }
          return null
        }

        // Helper: apply plan state to a user row.
        async function setUserPlan(
          userId: string,
          sub: Stripe.Subscription,
          plan: 'free' | 'pro'
        ) {
          const periodEnd = (sub as any).current_period_end
            ? new Date((sub as any).current_period_end * 1000).toISOString()
            : null
          await adminClient
            .from('users')
            .update({
              plan,
              plan_expires_at: plan === 'pro' ? periodEnd : null,
              stripe_subscription_id: sub.id,
            })
            .eq('id', userId)
        }

        try {
          switch (event.type) {
            case 'checkout.session.completed': {
              const session = event.data.object as Stripe.Checkout.Session
              if (session.subscription) {
                const sub = await stripe.subscriptions.retrieve(
                  typeof session.subscription === 'string'
                    ? session.subscription
                    : session.subscription.id
                )
                const userId = session.metadata?.supabase_user_id
                  ?? session.client_reference_id
                  ?? await getUserIdFromSub(sub)
                if (userId) {
                  await setUserPlan(userId, sub, 'pro')
                }
              }
              break
            }
            case 'customer.subscription.updated':
            case 'customer.subscription.created': {
              const sub = event.data.object as Stripe.Subscription
              const userId = await getUserIdFromSub(sub)
              if (userId) {
                const plan = ['active', 'trialing'].includes(sub.status) ? 'pro' : 'free'
                await setUserPlan(userId, sub, plan)
              }
              break
            }
            case 'customer.subscription.deleted': {
              const sub = event.data.object as Stripe.Subscription
              const userId = await getUserIdFromSub(sub)
              if (userId) {
                await setUserPlan(userId, sub, 'free')
              }
              break
            }
            default:
              // Ignore unhandled event types — Stripe sends many.
              break
          }
        } catch (err) {
          console.error(`Webhook handler error for ${event.type}:`, err)
          return new Response('Webhook handler error', { status: 500 })
        }

        return new Response('ok', { status: 200 })
      })
      ```

