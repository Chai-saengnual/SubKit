  - id: settings-upgrade-flow
    title: 'Settings: Pro upgrade flow + plan state display + customer portal link'
    depends_on: [visual-redesign]
    prompt: |
      Read the PRD at `docs/v1.0-prd.md` §11 task 5. The visual track has already added the paywall modal UI. Your job is to wire the upgrade flow to the create-checkout edge function.

      Branch: `codex/v1.0-week-1`. The visual track will have committed the paywall modal — read `index.html` to see the current state of the Settings section and the paywall modal.

      ## Change 1: Add Settings → "Account & Plan" section

      In the Settings screen (around line 850+ in `index.html`), add a new settings section AFTER the existing "Cloud Sync" section. Title: "💎 Plan". Contents:

      - Read-only display: "Current plan: Free" (or "Pro · renews [date]" if Pro)
      - If Free: a single button "Upgrade to Pro" that opens the paywall modal
      - If Pro: a button "Manage subscription" that opens `https://billing.stripe.com/p/login/test_xxx` (will be replaced with the real portal link in production)
      - If Pro: a small text "Cancel anytime from the customer portal. Pro includes unlimited subscriptions, multi-device sync, and full analytics."

      Style matches the existing settings section pattern.

      ## Change 2: Wire the "Upgrade to Pro" button

      In the paywall modal (added by the visual track), the "Upgrade to Pro" button should now call a new function `upgradeToPro(plan)`. The function:

      1. Gets the current session: `var session = await supabaseClient.auth.getSession(); var token = session.data.session?.access_token;`
      2. POSTs to `${SUPABASE_URL}/functions/v1/create-checkout` with `Authorization: Bearer ${token}` and body `{"plan": "monthly"}` (or "yearly" based on which card the user clicked — add a plan selector parameter to the button click handler)
      3. Parses `{ url: ... }` and `window.location.href = url` to redirect to Stripe
      4. On error, toast "Could not start checkout: [error]"

      ## Change 3: Wire the post-checkout return

      When the user returns from Stripe (URL has `?upgrade=success` or `?upgrade=cancel`), the app should:
      - On success: toast "🎉 Welcome to Pro! Your plan will activate in a moment." Then call `loadSubscriptions()` to refresh.
      - On cancel: toast "Checkout cancelled."
      - Both handled in `initAuth()` or a new `handleCheckoutReturn()` function called at app startup.

      Also poll the `users` table once after returning (Realtime subscription on the row, or just a one-time `supabaseClient.from('users').select('plan').eq('id', currentUser.id).single()` after a 2s delay) to refresh the displayed plan state.

      ## Change 4: Add `getCurrentPlan()` helper

      A small function that reads `currentUser.plan` (assuming we'll cache it on the user object, or fetches from `users` table). Use it to render the Settings display.

      If `currentUser` doesn't have a `plan` field, fetch it: `var { data } = await supabaseClient.from('users').select('plan, plan_expires_at').eq('id', currentUser.id).single(); if (data) currentUser.plan = data.plan;`

      Cache the result so the Settings screen doesn't re-fetch on every render.

      ## Change 5: Display the user's plan in the sidebar / nav

      In the top nav (added by visual track), if the user is Pro, show a small "PRO" badge next to the brand mark. If Free, no badge. Inline JS check on `currentUser.plan === 'pro'`.

      ## Static checks (run from repo root, capture output in deliverable.md)

      ```bash
      node -e "
      const fs = require('fs');
      const html = fs.readFileSync('index.html', 'utf8');
      const checks = {
        'Plan section exists': /Account\s*&\s*Plan|💎\s*Plan/.test(html),
        'upgradeToPro function': html.includes('function upgradeToPro'),
        'create-checkout call': html.includes('functions/v1/create-checkout'),
        'checkout return handler': /upgrade=(success|cancel)/.test(html),
        'PRO badge': /PRO/.test(html),
        'getCurrentPlan helper': html.includes('function getCurrentPlan') || html.includes('async function getCurrentPlan') || html.includes('getCurrentPlan ='),
        'onclick count >= 90': (html.match(/onclick=/g) || []).length >= 90
      };
      Object.entries(checks).forEach(([k,v]) => console.log((v?'OK ':'FAIL ')+k));
      process.exit(Object.values(checks).every(Boolean) ? 0 : 1);
      "
      ```

      All 7 must pass.

      Do NOT touch: supabase files, migrations, edge functions.
      Do NOT modify the visual track's CSS — it should be in place already.
      Commit message: `feat(v1.0): wire Pro upgrade flow in Settings`
    assigned_to: coder
    verified_by: verifier
    verify_prompt: |
      Branch: `codex/v1.0-week-1`. Verify the Settings upgrade flow in `index.html`:

      1. **Plan section** (Change 1): read the Settings screen, find a new "Account & Plan" or "💎 Plan" section. Confirm it has a "Current plan: Free/Pro" display, an "Upgrade to Pro" button (Free) or "Manage subscription" button (Pro), and the cancellation text. Style matches existing settings sections.

