         - Pricing section with Free and Pro
         - FAQ section with at least 4 questions
         - Top nav matching the app's style (brand + nav items + "Get the app" CTA)
         - Outfit font loaded
         - Dark theme

      3. **App moved correctly** (Change 1): confirm `app.html` still has the topnav, the supabase client, the auth flow, all 88+ onclick handlers. The 600 lines of new v1.0 CSS are present. File size > 2000 lines.

      4. **Service worker** (Change 3): confirm `sw.js` has `app.html` in the SHELL array and the cache name is bumped (e.g. `subkit-v4` not `subkit-v3`).

      5. **Vercel config** (Change 4): confirm `vercel.json` exists, is valid JSON, has the two rewrites (`/` → `/index.html` and `/app` → `/app.html`).

      6. **Browser test** of the marketing site: render `index.html` in headless Chrome (`chrome-headless-shell` at the same path as before). Confirm no console errors, hero + features + pricing + FAQ all visible. Save screenshot to `/tmp/marketing.png`.

