      ## File 1: `supabase/migrations/20260615210000_create_users_table.sql`

      New migration. Mirrors the style of existing migrations (snake_case timestamps, idempotent where possible).

      ```sql
      -- Users table — one row per Supabase auth.users entry.
      -- Holds the plan state (free | pro) and Stripe customer linkage.
      -- Created with a trigger that auto-inserts a users row whenever
      -- a new auth.users row is created, so the app can always JOIN.
      create table if not exists public.users (
        id uuid primary key references auth.users(id) on delete cascade,
        email text not null,
        plan text not null default 'free' check (plan in ('free', 'pro')),
        plan_expires_at timestamptz,
        stripe_customer_id text,
        stripe_subscription_id text,
        created_at timestamptz not null default timezone('utc', now()),
        updated_at timestamptz not null default timezone('utc', now())
      );

      create index if not exists users_stripe_customer_id_idx
        on public.users (stripe_customer_id)
        where stripe_customer_id is not null;

      drop trigger if exists set_users_updated_at on public.users;
      create trigger set_users_updated_at
      before update on public.users
      for each row
      execute function public.handle_updated_at();

      -- RLS: a user can read/update their own row only.
      alter table public.users enable row level security;

      create policy "Users can view their own profile"
        on public.users for select
        to authenticated
        using ((select auth.uid()) = id);

      create policy "Users can update their own profile"
        on public.users for update
        to authenticated
        using ((select auth.uid()) = id)
        with check ((select auth.uid()) = id);

      -- Service role can do anything (used by stripe-webhook edge function)
      create policy "Service role has full access"
        on public.users for all
        to service_role
        using (true)
        with check (true);

      -- Auto-create a users row when auth.users gets a new row.
      create or replace function public.handle_new_auth_user()
      returns trigger
      language plpgsql
      security definer
      as $$
      begin
        insert into public.users (id, email)
        values (new.id, new.email)
        on conflict (id) do nothing;
        return new;
      end;
      $$;

      drop trigger if exists on_auth_user_created on auth.users;
      create trigger on_auth_user_created
      after insert on auth.users
      for each row
      execute function public.handle_new_auth_user();
      ```

      ## File 2: `supabase/migrations/20260615220000_free_tier_limit.sql`

      Trigger on `subscriptions` to enforce 5-sub limit for free users.

      ```sql
      -- Free-tier enforcement: free users can have at most 5 rows
      -- in public.subscriptions. Pro users (users.plan = 'pro') are
      -- exempt. Edge function and app code handle the friendly error;
      -- this trigger is the hard backend gate.
      create or replace function public.check_free_tier_limit()
      returns trigger
      language plpgsql
      as $$
      declare
        user_plan text;
        current_count integer;
      begin
        select plan into user_plan
        from public.users
        where id = auth.uid();

        if user_plan is distinct from 'pro' then
          select count(*) into current_count
          from public.subscriptions
          where user_id = auth.uid();

          if current_count >= 5 then
            raise exception 'FREE_TIER_LIMIT_REACHED'
              using errcode = 'P0001',
                    hint = 'Free tier limited to 5 subscriptions. Upgrade to Pro for unlimited.';
          end if;
        end if;

        return new;
      end;
      $$;

      drop trigger if exists enforce_free_tier_limit on public.subscriptions;
      create trigger enforce_free_tier_limit
      before insert on public.subscriptions
      for each row
      execute function public.check_free_tier_limit();
      ```

      Note: the same trigger should also fire on `subscription_invoices` (separate 5 limit, per PRD §4.1). For now, ship the subscriptions trigger only — invoices can be added in a follow-up.

      ## File 3: `supabase/functions/_shared/plan.ts`

      Shared helper used by the edge functions. Export the function that reads the user's plan.

      ```typescript
      // supabase/functions/_shared/plan.ts
      import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

      export type Plan = 'free' | 'pro'

      export interface PlanState {
        plan: Plan
        plan_expires_at: string | null
        stripe_customer_id: string | null
        stripe_subscription_id: string | null
      }

      export async function getPlan(
        supabaseUrl: string,
        supabaseServiceKey: string,
        userId: string
      ): Promise<PlanState> {
        const supabase = createClient(supabaseUrl, supabaseServiceKey)
        const { data, error } = await supabase
          .from('users')
          .select('plan, plan_expires_at, stripe_customer_id, stripe_subscription_id')
          .eq('id', userId)
          .single()
        if (error || !data) {
          return { plan: 'free', plan_expires_at: null, stripe_customer_id: null, stripe_subscription_id: null }
        }
        return data as PlanState
      }

      export function isPro(state: PlanState): boolean {
        if (state.plan !== 'pro') return false
        if (!state.plan_expires_at) return true  // no expiry = lifetime/manual
        return new Date(state.plan_expires_at) > new Date()
      }
      ```

