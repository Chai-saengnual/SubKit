  - id: marketing-site-redirect
    title: 'Marketing landing page at / + move app to /app'
    depends_on: [visual-redesign]
    prompt: |
      Read the PRD at `docs/v1.0-prd.md` §7. Read the existing `index.html` (the app) to understand the current structure.

      Branch: `codex/v1.0-week-1`. The visual track has already added the topnav. Your job is to create the marketing landing page at the root URL and move the app to `/app`.

      ## Change 1: Move current app to `/app`

      The current `index.html` becomes the app. To make it accessible at `/app`:
      - Move `index.html` content to `app.html` (rename the file content)
      - Create a new `index.html` for the marketing landing
      - OR keep `index.html` as the app and create `marketing.html`, then use Vercel rewrites to serve marketing at `/` and app at `/app`

      The simplest approach: create `vercel.json` with rewrites. But this is a static-only Vercel project (no server). Vercel supports `cleanUrls` and `rewrites` for static. Use the second approach: keep `index.html` as the app at `/app`, create `marketing/index.html` for the marketing page, and use `vercel.json` rewrites:

      Actually, the cleanest approach is:
      1. Create `marketing/index.html` — the new marketing landing
      2. Create `vercel.json` with:
         ```json
         {
           "rewrites": [
             { "source": "/app", "destination": "/index.html" },
             { "source": "/", "destination": "/marketing/index.html" }
           ]
         }
         ```
      3. Existing bookmarks to `subkit-ten.vercel.app/` will land on the marketing page (good)
      4. The app is now at `subkit-ten.vercel.app/app` (existing users with deep links break — but we have very few of those)

      For local dev: `python3 -m http.server` serves files literally, so `index.html` is at `/` and `app.html` is at `/app.html`. Add a JS redirect at the top of the current `index.html`: if the URL is `index.html` and we're at `/`, redirect to `/app.html`. NO — that would break the production Vercel setup. Instead:
      - Rename current `index.html` → `app.html`
      - Create new `index.html` → marketing landing
      - Add `vercel.json` rewrites
      - This way: prod = Vercel handles via rewrites. Local = you serve the dir with `python3 -m http.server` and visit `index.html` (marketing) or `app.html` (app) directly.

      **DECISION:** rename current `index.html` to `app.html` and create a new `index.html` for marketing. This is the simplest. Update `sw.js` cache list to include `app.html`.

      ## Change 2: Build the marketing landing page

      `index.html` (the new one) should be a clean marketing page with:
      - Top nav (matches the app's topnav style, simplified): brand + "Features" + "Pricing" + "FAQ" + "Get the app" CTA button
      - Hero: phone mockup image (use a screenshot from the app — or for now, a CSS-drawn placeholder showing the v1.0 dark theme dashboard) + headline "Your subscriptions, one number you can trust" + subheadline "Track in 5 seconds. Real reminders. Multi-device sync. No bank linking." + CTA buttons "Get the app" and "Try the web app" (link to /app.html)
      - Features: 3-column grid of value props (Track in 5 seconds / Reminders that work / Sync across devices) — copy from `docs/v1.0-prd.md` §7.3
      - Pricing: 2 cards (Free $0 / Pro $4.99/mo or $39/yr) — copy from §7.4
      - FAQ: 6 questions from §7.5, with your own answers
      - Footer: small print, "© 2026 Chai Saengnual · [Privacy](#) · [Terms](#)"

      Style: matches the app's v1.0 dark+minimax visual language. Outfit font. Cyan accent.

      Use the same CSS custom properties as the app so a future DESIGN.md lint passes both files. (Don't run the lint — just match the values.)

      ## Change 3: Service worker update

      `sw.js` currently caches `['/', '/index.html', '/icon.svg', '/manifest.json']`. Add `/app.html` to the SHELL array. Bump cache name from `subkit-v3` to `subkit-v4` to bust the cache.

      ## Change 4: Vercel config

      Create `vercel.json` at repo root:

      ```json
      {
        "rewrites": [
          { "source": "/", "destination": "/index.html" },
          { "source": "/app", "destination": "/app.html" }
        ]
      }
      ```

      ## Static checks (run from repo root, capture output in deliverable.md)

      ```bash
      ls -la index.html app.html marketing/index.html vercel.json sw.js 2>&1
      echo "---sw.js has /app.html---"
      grep -c "/app.html" sw.js
      echo "---vercel.json valid---"
      cat vercel.json | python3 -m json.tool > /dev/null && echo OK || echo FAIL
      echo "---index.html is marketing (has 'Get the app' CTA)---"
      grep -c "Get the app" index.html
      echo "---app.html still has the app (has 'topnav')---"
      grep -c "topnav" app.html
      ```

      All checks should pass.

      Do NOT touch: supabase files, edge functions, the visual track's CSS, the settings upgrade flow.
      Commit message: `feat(v1.0): marketing landing at /, app moved to /app`
    assigned_to: coder
    verified_by: verifier
    verify_prompt: |
      Branch: `codex/v1.0-week-1`. Verify the marketing site structure:

      1. **Files exist** (Change 1): `index.html`, `app.html`, `marketing/index.html`, `vercel.json` all exist. `index.html` is the marketing page (smaller, < 500 lines). `app.html` is the original app (larger, ~3000 lines).

      2. **Marketing page content** (Change 2): confirm `index.html` contains:
