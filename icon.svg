<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0f"/>
      <stop offset="1" stop-color="#1c1c26"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4dd8e8"/>
      <stop offset="1" stop-color="#4ddc9a"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Stylized "S" mark for SubKit, made from a receipt-stack motif -->
  <g transform="translate(96,96)">
    <!-- Three stacked cards, like subscription cards -->
    <rect x="40" y="20" width="240" height="240" rx="28" fill="#1c1c26" stroke="#3a3a50" stroke-width="2"/>
    <rect x="20" y="40" width="240" height="240" rx="28" fill="#22222e" stroke="#3a3a50" stroke-width="2"/>
    <rect x="0" y="60" width="240" height="240" rx="28" fill="#13131a" stroke="#4dd8e8" stroke-width="2"/>
    <!-- Currency indicator on the top card -->
    <circle cx="40" cy="100" r="10" fill="url(#bolt)"/>
    <rect x="60" y="94" width="120" height="12" rx="6" fill="#3a3a50"/>
    <!-- The bold "S" in the center -->
    <text x="120" y="220" font-family="Outfit, system-ui, sans-serif" font-size="160" font-weight="800" text-anchor="middle" fill="url(#bolt)" letter-spacing="-0.04em">S</text>
  </g>
</svg>
